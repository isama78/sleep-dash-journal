<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sleep Journal</title>
  </head>
  <body>
    <h1>Sleep Journal</h1>

    <form id="entryForm">
      <label>Date:</label><br />
      <input id="date" type="date" required /><br /><br />

      <label>Bedtime:</label><br />
      <input id="bedtime" type="time" required /><br /><br />

      <label>Wake Time:</label><br />
      <input id="wakeTime" type="time" required /><br /><br />

      <label>Notes:</label><br />
      <textarea id="notes" maxlength="500"></textarea><br /><br />

      <button type="submit">Save Entry</button>
    </form>

    <p id="status"></p>
    <hr />
    <div id="entriesList"></div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
